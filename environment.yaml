name: des-lj

channels:
  - conda-forge
  - openeye
  - bioconda

dependencies:

  - python >=3.10

  - smee
  - descent
  - pytorch-gpu
  - bokeh
  - panel
  - seaborn
  - plotmol
  - smirnoff-plugins
  - de-forcefields>=1.0.4
  - datasets>=3.6 # Need newish version to handle pathlib paths correctly

  # Workflow
  - snakemake
  - loguru
  - more-itertools

  # Parameterization
  - openff-toolkit
  - openff-interchange
  - rdkit
  - openeye-toolkits

  # Training
  - tensorboard
  - tensorboardX
  - tbparse

  # Dev
  - pre-commit
  - ruff
  - mypy

